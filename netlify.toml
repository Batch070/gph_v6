[build]
  publish = "frontend"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["app/**", "requirements.txt"]

[build.environment]
  PYTHON_VERSION = "3.9"

# Redirect all API traffic to the FastAPI serverless function
[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# Catch-all redirect for Single Page Apps (SPA) / routing if applicable
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
